<section class="contribution-panel">
  <h3>{{ heading }}</h3>
  <p>{{ body }}</p>

  <div class="contribution-panel__row">
    <label for="contributionAmount">Optional contribution (USD)</label>
    <div class="contribution-panel__input-wrap">
      <span>$</span>
      <input
        id="contributionAmount"
        type="number"
        min="1"
        step="1"
        [placeholder]="suggestedAmount.toString()"
        [(ngModel)]="amountInput"
        (blur)="emitAmount()"
      />
    </div>
  </div>

  <button type="button" class="button-secondary" (click)="triggerContribution()" [disabled]="pending">
    {{ pending ? 'Opening checkout...' : buttonLabel }}
  </button>
</section>
